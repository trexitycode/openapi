description: Payload object used to create a shipment
type: object
required:
  - parcels
properties:
  locationId:
    type: string
    description: Optionally set Location that this Shipment will belong to. Please see [Locations](#tag/Locations)
  serviceTypeOrRateId:
    oneOf:
      - type: string
        enum:
          - default
          - nextday
          - direct
          - draft
        description: |
          **(ADDED IN v1.31)** The optional service type to use when creating the shipment.
          Allowed values:
          - `default`
          - `direct`
          - `nextday`
          - `draft` = Creates the shipment as a draft with no service level. The shipment will have no rate and cannot be posted or scheduled until a service type is selected. Useful for ingesting orders that will be batched or assigned a service level later.

          If not provided, the API uses the merchant location's default service type.
          If that default is set to `draft`, shipments are created as drafts by default.
      - type: string
        format: uuid
        description: |
          **(ADDED IN v1.31)** The optional rate ID to use when creating the shipment. The rate ID must be valid and not expired.
          A rate ID can only be used once in a request to create a shipment. The service type will be inferred from the associated rate.

          The exact same address information must be provided as the rate was calculated with.

          When using a rate ID, the `pickupStartAt`, `pickupEndAt`, `deliverStartAt`, and `deliverEndAt` fields cannot be provided.
          Since a scheduled time could change the rate.
  scheduledPostAt:
    type: 'string'
    deprecated: true
    description: |
      **DEPRECATED AS OF v1.21**.
      Use the `pickupStartAt` field instead.
  pickupStartAt:
    $ref: '../PickupStartAt.yaml'
  pickupEndAt:
    $ref: '../PickupEndAt.yaml'
  deliverStartAt:
    $ref: '../DeliverStartAt.yaml'
  deliverEndAt:
    $ref: '../DeliverEndAt.yaml'
  pickupAddress:
    $ref: ../Address.yaml
  pickupAddressNotes:
    type: string
    description: Extra information relating to the pickup address ONLY, like the apartment/unit number.
  requirements:
    $ref: ../ShipmentRequirements.yaml
  pickupInstructions:
    type: string
    description: |
      **(RENAMED FROM pickupNotes TO pickupInstructions IN v1.16) pickupNotes will still be accepted**
      Special notes or instructions regarding pickup like the description of the location, what door to use, etc.
  merchantPpid:
    type: string
    description: Partner-provided ID of the merchant. This ID can be used when querying for shipments. Only used by Partner accounts.
  merchantName:
    type: string
    description: Partner-provided name of the merchant. This will be displayed in place of the merchant name defined in the merchant profile. Only used by Partner accounts.
  merchantPhone:
    type: string
    description: Partner-provided phone of the merchant. This will be displayed in place of the merchant phone defined in the merchant profile. Only used by Partner accounts.
  merchantEmail:
    type: string
    description: Partner-provided email of the merchant. This will be displayed in place of the merchant email defined in the merchant profile. Only used by Partner accounts.
  ignoreTargetDeliveryDuration:
    type: boolean
    deprecated: true
  parcels:
    type: array
    description: The parcel that will be delivered in this shipment. This must contain exactly one parcel.
    minItems: 1
    maxItems: 1
    items:
      allOf:
        - $ref: ./ParcelPayload.yaml
        - $ref: ./SpecialParcelFields.yaml
        - type: object
          required:
            - deliveryAddress
            - deliveryName
            - description
            - orderId
            - parcelValue
