type: object
nullable: true
description: The most recent run record for this slot on this date, or null if no run exists

properties:
  runId:
    type: string
    nullable: true
    description: The run ID of the most recent run record if it exists for this slot on this date, otherwise null

  shipmentCount:
    type: integer
    description: Number of shipments included in the run for batching.

  error:
    type: string
    nullable: true
    description: |
      Error message if the run failed, otherwise null. When there is an error use the
      [List Auto-Batch Run Failed Shipments](/#operation/listAutoBatchRunFailedShipments) endpoint to get the list of shipments that failed to be batched.
      

  hasResults:
    type: boolean
    description: |
      Whether the run produced any created or failed shipments. When there are results use the
      [List Auto-Batch Run Created Shipments](/#operation/listAutoBatchRunCreatedShipments) endpoint to get the list of shipments that were successfully batched.

  createdShipmentCount:
    type: integer
    description: Number of shipments that were successfully created batch shipments during the run

  scheduledShipmentCount:
    type: integer
    description: Number of shipments that were unbatched but were scheduled during the run

  failedShipmentCount:
    type: integer
    description: Number of shipments that failed to batch during the run

  createdAt:
    type: string
    format: date-time
    nullable: true
    description: When the run record was created, or null if no run exists

  completedAt:
    type: string
    format: date-time
    nullable: true
    description: When the run completed, or null if not yet completed or no run exists