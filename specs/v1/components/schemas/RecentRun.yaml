type: object
nullable: true
description: The most recent run record for this slot on this date, or null if no run exists

properties:
  runId:
    type: string
    nullable: true
    description: The run ID of the most recent run record if it exists for this slot on this date, otherwise null

  shipmentCount:
    type: integer
    description: Number of shipments included in the run. 0 if no run exists.

  error:
    type: string
    nullable: true
    description: Error message if the run failed, otherwise null

  hasResults:
    type: boolean
    description: Whether the run produced any created or failed shipments

  createdAt:
    type: string
    format: date-time
    nullable: true
    description: When the run record was created, or null if no run exists

  completedAt:
    type: string
    format: date-time
    nullable: true
    description: When the run completed, or null if not yet completed or no run exists