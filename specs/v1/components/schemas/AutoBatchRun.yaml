type: object
properties:
  data:
    type: object
    properties:
      locationId:
        type: string
        description: The merchant location ID
      runId:
        type: string
        description: The auto batch run ID
      runDate:
        type: string
        description: The calendar date of the run in YYYY-MM-DD format
      fulfillmentSlotId:
        type: string
        description: The fulfillment slot ID this run was triggered for
      readyWeekday:
        type: string
        description: The weekday batches will be scheduled ready for pickup on
        enum:
          - monday
          - tuesday
          - wednesday
          - thursday
          - friday
          - saturday
          - sunday
      ordersPreparedByTime:
        type: string
        description: The time batches will be scheduled ready for pickup in HH:mm format
      orderCutoffTime:
        type: string
        description: The order cutoff time for this run in HH:mm format. This is also the time of the run.
      orderCutoffWeekday:
        type: string
        description: The order cutoff weekday for this run. This is also the weekday of the run.
      status:
        type: string
        description: |
          The status of the run.

          Use the [List Auto-Batch Run Created Shipments](/#operation/listAutoBatchRunCreatedShipments) endpoint to get the list of shipments that were successfully batched.
          Use the [List Auto-Batch Run Failed Shipments](/#operation/listAutoBatchRunFailedShipments) endpoint to get the list of shipments that failed to be batched.

          - `preparing`: The run has been created but the batch operation has not started.
          - `batching`: The batch operation is in progress.
          - `completed`: The run finished and produced results.
          - `failed`: The run encountered an error (the runError field will be non-null).
          - `skipped`: The run completed but there were no shipments to batch.
        enum:
          - preparing
          - batching
          - completed
          - failed
          - skipped
      shipmentCount:
        type: integer
        description: Total number of shipments that were included in the run
      createdShipmentCount:
        type: integer
        description: Number of shipments successfully batched/created
      failedShipmentCount:
        type: integer
        description: Number of shipments that failed during batching
      runError:
        type: string
        nullable: true
        description: Error message if the run failed, otherwise null
      completedAt:
        type: string
        format: date-time
        nullable: true
        description: When the run completed, or null if still in progress