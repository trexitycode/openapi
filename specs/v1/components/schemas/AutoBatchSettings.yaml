description: Auto batch settings for a merchant location
type: object
properties:
  autoBatchingEnabled:
    type: boolean
    description: Whether auto batching is turned on for this location

  batchSchedule:
    type: array
    items:
      type: string
      enum:
        - monday
        - tuesday
        - wednesday
        - thursday
        - friday
        - saturday
        - sunday
    description: Weekday names on which batching runs

  includeBatchPickupTimeShipments:
    type: boolean
    description: Whether to include shipments that already have a batch pickup time

  includeDraftShipments:
    type: boolean
    description: Whether to include draft shipments in the batch

  usePickupTimeStaggering:
    type: boolean
    description: Whether pickup times are staggered across routes

  blackoutSchedule:
    $ref: ./BlackoutSchedule.yaml
