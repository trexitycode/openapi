description: Auto batch run data for a single day
type: object
properties:
  off:
    type: boolean
    description: Whether this day is not in the batch schedule or falls on a blackout date

  runDate:
    type: string
    description: The calendar date in YYYY-MM-DD format that the auto batching may run on
    example: '2026-02-23'

  weekday:
    type: string
    description: The weekday that the auto batching may run on
    enum:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday

  slots:
    type: array
    items:
      $ref: ./FulfillmentSlotRunEntry.yaml
    description: One entry per configured fulfillment slot for this location associated with this weekday
