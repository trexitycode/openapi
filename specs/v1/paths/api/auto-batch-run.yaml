get:
  operationId: getAutoBatchRun
  tags: [Auto Batching]
  summary: Get Auto Batch Run Details
  description: |
    Retrieves detailed information about a single auto batch run.

  ##############################################################################

  parameters:
    - in: path
      name: locationId
      required: true
      schema:
        type: string
      description: Merchant location ID
    - in: path
      name: runId
      required: true
      schema:
        type: string
      description: Auto batch run ID

  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  locationId:
                    type: string
                    description: The merchant location ID
                  runId:
                    type: string
                    description: The auto batch run ID
                  runDate:
                    type: string
                    description: The date of the run in YYYY-MM-DD format
                  autoBatchSlotId:
                    type: string
                    description: The slot ID this run was triggered for
                  cutoffTime:
                    type: string
                    description: The cutoff time used for this run in HH:mm format
                  pickupTime:
                    type: string
                    description: The pickup time used for this run in HH:mm format
                  status:
                    type: string
                    description: |
                      The current status of this run.

                      - `preparing`: The run has been created but the batch operation has not started.
                      - `batching`: The batch operation is in progress.
                      - `completed`: The run finished and produced results.
                      - `failed`: The run encountered an error (the runError field will be non-null).
                      - `skipped`: The run completed but there were no shipments to batch.
                    enum:
                      - preparing
                      - batching
                      - completed
                      - failed
                      - skipped
                  shipmentCount:
                    type: integer
                    description: Total number of shipments that were included in the run
                  createdShipmentCount:
                    type: integer
                    description: Number of shipments successfully batched/created
                  failedShipmentCount:
                    type: integer
                    description: Number of shipments that failed during batching
                  runError:
                    type: string
                    nullable: true
                    description: Error message if the run failed, otherwise null
                  completedAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: When the run completed, or null if still in progress
          examples:
            Success:
              value:
                data:
                  locationId: 'loc_abc123'
                  runId: 'run_xyz789'
                  runDate: '2026-02-23'
                  autoBatchSlotId: 'slot_001'
                  cutoffTime: '11:00'
                  pickupTime: '11:45'
                  status: 'completed'
                  shipmentCount: 5
                  createdShipmentCount: 4
                  failedShipmentCount: 1
                  runError: null
                  completedAt: '2026-02-23T16:02:00.000Z'
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              code: { type: string, nullable: true }
              params: { type: object, nullable: true }
    '401':
      description: Missing or invalid authentication
    '404':
      description: Location or run not found, or does not belong to the authenticated merchant
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '500':
      description: An internal error has occurred and the request cannot be completed.
      content:
        application/json:
          schema:
            required: [error]
            properties:
              error:
                type: string
