get:
  operationId: getAutoBatchRun
  tags: [Auto Batching]
  summary: Get Auto Batch Run Details
  description: |
    Retrieves detailed information about a single auto batch run.

  ##############################################################################

  parameters:
    - in: path
      name: locationId
      required: true
      schema:
        type: string
      description: Merchant location ID
    - in: path
      name: runId
      required: true
      schema:
        type: string
      description: Auto batch run ID

  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/AutoBatchRun.yaml
          examples:
            Success:
              value:
                data:
                  locationId: 'loc_abc123'
                  runId: 'run_xyz789'
                  runDate: '2026-02-23'
                  fulfillmentSlotId: 'slot_001'
                  orderCutoffTime: '11:00'
                  ordersPreparedByTime: '11:45'
                  orderCutoffWeekday: 'monday'
                  readyWeekday: 'monday'
                  status: 'completed'
                  shipmentCount: 5
                  createdShipmentCount: 4
                  failedShipmentCount: 1
                  runError: null
                  completedAt: '2026-02-23T16:02:00.000Z'
    '401':
      description: Missing or invalid authentication
    '404':
      description: Location or run not found, or does not belong to the authenticated merchant
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '500':
      description: An internal error has occurred and the request cannot be completed.
      content:
        application/json:
          schema:
            required: [error]
            properties:
              error:
                type: string
