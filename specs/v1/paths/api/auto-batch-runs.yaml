get:
  operationId: listAutoBatchRuns
  tags: [Auto Batching]
  summary: List Auto Batch Runs
  description: |
    Lists auto batch run status for every configured fulfillment slot across a date range — either today (1 day) or a full week (7 days).

    Use this endpoint to poll for the status of auto batch runs for a given week or today.

    Auto batch runs are only kept for a period of 7 days.

  ##############################################################################

  parameters:
    - in: path
      name: locationId
      required: true
      schema:
        type: string
      description: Merchant location ID
    - in: query
      name: range
      required: true
      schema:
        type: string
        enum:
          - today
          - week
      description: The date range to query.
    - in: query
      name: weekStart
      required: false
      schema:
        type: string
        format: date
      description: Required when `range=week`. The Monday (or first day) of the week to query in YYYY-MM-DD format. Ignored when `range=today`.
    - in: query
      name: page
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
        maximum: 100000
      description: Page number (1-indexed)
    - in: query
      name: pageSize
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
      description: Number of items per page

  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  locationId:
                    type: string
                    description: The merchant location ID
                  range:
                    type: string
                    enum:
                      - today
                      - week
                    description: The range that was queried
                  weekStart:
                    type: string
                    nullable: true
                    description: The YYYY-MM-DD week start date when range=week, otherwise null
                  days:
                    type: array
                    items:
                      $ref: ../../components/schemas/DayEntry.yaml
                    description: One entry per day in the range. Length is 1 when range=today, 7 when range=week.
          examples:
            Today:
              value:
                data:
                  locationId: 'loc_abc123'
                  range: 'today'
                  weekStart: null
                  days:
                    - off: false
                      runDate: '2026-02-23'
                      weekday: 'monday'
                      slots:
                        - fulfillmentSlotId: 'slot_001'
                          weekday: 'monday'
                          ordersPreparedBy: '10:45'
                          orderCutoffWeekday: 'monday'
                          orderCutoffTime: '10:00'
                          status: 'completed'
                          nextRunAt: '2026-02-24T15:00:00.000Z'
                          recentRun:
                            runId: 'run_xyz789'
                            shipmentCount: 5
                            error: null
                            hasResults: true
                            createdAt: '2026-02-23T14:55:00.000Z'
                            completedAt: '2026-02-23T15:02:00.000Z'
    '400':
      description: Validation error (range is missing or invalid, or range is week but weekStart is missing)
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              code: { type: string, nullable: true }
              params: { type: object, nullable: true }
    '401':
      description: Missing or invalid authentication
    '404':
      description: Location not found or does not belong to the authenticated merchant
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '500':
      description: An internal error has occurred and the request cannot be completed.
      content:
        application/json:
          schema:
            required: [error]
            properties:
              error:
                type: string
