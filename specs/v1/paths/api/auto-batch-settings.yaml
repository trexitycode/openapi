get:
  operationId: getAutoBatchSettings
  tags: [Auto Batching]
  summary: Get Auto Batch Settings
  description: |
    Retrieves the auto batching configuration and all configured fulfillment slots for a merchant location.


  ##############################################################################

  parameters:
    - in: path
      name: locationId
      required: true
      schema:
        type: string
      description: Merchant location ID

  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  locationId:
                    type: string
                    description: The merchant location ID
                  settings:
                    $ref: ../../components/schemas/AutoBatchSettings.yaml
                  slots:
                    type: array
                    items:
                      $ref: ../../components/schemas/FulfillmentSlot.yaml
                    description: All configured fulfillment slots, ordered by sortIndex. May be an empty array.
          examples:
            Success:
              value:
                data:
                  locationId: 'loc_abc123'
                  settings:
                    autoBatchingEnabled: true
                    includeBatchPickupTimeShipments: true
                    includeDraftShipments: false
                    usePickupTimeStaggering: true
                    blackoutSchedule:
                      blackoutDates: []
                      enabledHolidays: ['christmas']
                      customHolidays: []
                    enableNextBusinessDayScheduling: false
                  slots:
                    - id: 'slot_001'
                      weekday: 'monday'
                      ordersPreparedBy: '10:45'
                      preparationTimeValue: 45
                      preparationTimeUnit: 'minutes'
                      keepShipmentsAsDrafts: false
                      enabled: true
                      sortIndex: 0
                      orderCutoffWeekday: 'monday'
                      orderCutoffTime: '10:00'
                    - id: 'slot_002'
                      weekday: 'monday'
                      ordersPreparedBy: '14:45'
                      preparationTimeValue: 45
                      preparationTimeUnit: 'minutes'
                      keepShipmentsAsDrafts: false
                      enabled: true
                      sortIndex: 1
                      orderCutoffWeekday: 'monday'
                      orderCutoffTime: '14:00'
    '401':
      description: Missing or invalid authentication
    '404':
      description: Location not found or does not belong to the authenticated merchant
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '500':
      description: An internal error has occurred and the request cannot be completed.
      content:
        application/json:
          schema:
            required: [error]
            properties:
              error:
                type: string
